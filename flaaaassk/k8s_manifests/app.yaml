---
# Описание базы данных
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: flask-stack
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "maymay"
        - name: POSTGRES_PASSWORD
          value: "maymay"
        - name: POSTGRES_DB
          value: "flaskdb"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: flask-stack
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432